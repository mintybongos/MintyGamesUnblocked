<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Minty Games — Unblocked</title>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet"/>
  <style>
:root{--bg:#0a0f0d;--surface:#111a14;--surface-2:#192a1e;--border:#1e3324;--primary:#3ddc84;--primary-glow:rgba(61,220,132,0.22);--accent:#a8ff78;--text:#e0f0e8;--text-muted:#5a7a65;--danger:#ff5c72;--radius-sm:6px;--radius-md:12px;--radius-lg:20px;--font:'Space Grotesk',sans-serif;--mono:'Space Mono',monospace;--t:0.18s ease}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{background:var(--bg);color:var(--text);font-family:var(--font);min-height:100vh;overflow-x:hidden}
a{color:inherit;text-decoration:none}
button{cursor:pointer;font-family:var(--font);border:none;background:none}
.site-header{position:sticky;top:0;z-index:100;background:rgba(10,15,13,0.9);backdrop-filter:blur(16px);border-bottom:1px solid var(--border)}
.header-inner{max-width:1280px;margin:0 auto;padding:0 24px;height:64px;display:flex;align-items:center;justify-content:space-between;gap:16px}
.logo{display:flex;align-items:center;gap:10px;font-size:1.25rem;font-weight:700;letter-spacing:-0.02em;white-space:nowrap}
.logo-icon{font-size:1.5rem;line-height:1}
.logo-text em{font-style:normal;color:var(--primary)}
.search-input{background:var(--surface-2);border:1px solid var(--border);border-radius:var(--radius-sm);color:var(--text);font-family:var(--font);font-size:0.9rem;padding:8px 14px;width:240px;outline:none;transition:border-color var(--t),box-shadow var(--t)}
.search-input::placeholder{color:var(--text-muted)}
.search-input:focus{border-color:var(--primary);box-shadow:0 0 0 3px var(--primary-glow)}
.hero{max-width:1280px;margin:0 auto;padding:64px 24px 48px}
.hero-eyebrow{font-family:var(--mono);font-size:0.72rem;letter-spacing:0.12em;text-transform:uppercase;color:var(--primary);margin-bottom:16px}
.hero-title{font-size:clamp(2.4rem,5.5vw,4.5rem);font-weight:700;line-height:1.05;letter-spacing:-0.035em;margin-bottom:18px}
.hero-title::first-line{color:var(--primary)}
.hero-sub{color:var(--text-muted);font-size:1rem;max-width:460px;line-height:1.6}
.filter-bar{max-width:1280px;margin:0 auto;padding:0 24px 18px;display:flex;gap:8px;flex-wrap:wrap}
.filter-btn{padding:7px 16px;border-radius:999px;font-size:0.82rem;font-weight:500;border:1px solid var(--border);color:var(--text-muted);background:var(--surface);transition:all var(--t)}
.filter-btn:hover{border-color:var(--primary);color:var(--text)}
.filter-btn.active{background:var(--primary);border-color:var(--primary);color:#0a0f0d;font-weight:700;box-shadow:0 0 14px var(--primary-glow)}
.results-bar{max-width:1280px;margin:0 auto;padding:0 24px 14px;font-family:var(--mono);font-size:0.7rem;letter-spacing:0.06em;text-transform:uppercase;color:var(--text-muted)}
.game-grid{max-width:1280px;margin:0 auto;padding:0 24px 80px;display:grid;grid-template-columns:repeat(auto-fill,minmax(190px,1fr));gap:14px}
.game-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-md);padding:22px 18px 18px;cursor:pointer;transition:transform var(--t),border-color var(--t),box-shadow var(--t);display:flex;flex-direction:column;gap:8px;position:relative;overflow:hidden}
.game-card::before{content:'';position:absolute;inset:0;background:linear-gradient(135deg,var(--primary-glow) 0%,transparent 55%);opacity:0;transition:opacity var(--t);border-radius:inherit}
.game-card:hover{transform:translateY(-4px);border-color:var(--primary);box-shadow:0 8px 28px var(--primary-glow)}
.game-card:hover::before{opacity:1}
.card-emoji{font-size:2rem;line-height:1}
.card-title{font-size:0.95rem;font-weight:700;letter-spacing:-0.01em}
.card-desc{font-size:0.78rem;color:var(--text-muted);line-height:1.5;flex:1}
.card-badge{display:inline-block;font-family:var(--mono);font-size:0.62rem;letter-spacing:0.07em;text-transform:uppercase;padding:3px 8px;border-radius:999px;background:var(--surface-2);color:var(--accent);border:1px solid rgba(168,255,120,0.18);align-self:flex-start}
.card-play-btn{margin-top:4px;padding:9px 0;width:100%;border-radius:var(--radius-sm);background:var(--primary);color:#0a0f0d;font-size:0.83rem;font-weight:700;letter-spacing:0.02em;transition:background var(--t),box-shadow var(--t)}
.card-play-btn:hover{background:var(--accent);box-shadow:0 4px 16px var(--primary-glow)}
.empty-state{text-align:center;padding:80px 24px;color:var(--text-muted)}
.empty-icon{font-size:3rem;display:block;margin-bottom:16px}
.modal-overlay{position:fixed;inset:0;z-index:200;background:rgba(0,0,0,0.82);backdrop-filter:blur(8px);display:flex;align-items:center;justify-content:center;padding:16px;animation:fadeIn 0.15s ease}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
.modal{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);width:100%;max-width:980px;max-height:93vh;display:flex;flex-direction:column;overflow:hidden;animation:slideUp 0.2s ease}
@keyframes slideUp{from{transform:translateY(24px);opacity:0}to{transform:none;opacity:1}}
.modal-header{display:flex;align-items:center;justify-content:space-between;padding:16px 22px;border-bottom:1px solid var(--border);flex-shrink:0;gap:12px}
.modal-title-group{display:flex;align-items:center;gap:14px}
.modal-emoji{font-size:1.8rem;line-height:1}
.modal-title{font-size:1.1rem;font-weight:700;margin-bottom:4px}
.modal-badge{font-family:var(--mono);font-size:0.62rem;text-transform:uppercase;letter-spacing:0.08em;color:var(--accent);background:rgba(168,255,120,0.08);border:1px solid rgba(168,255,120,0.18);padding:2px 8px;border-radius:999px}
.modal-actions{display:flex;align-items:center;gap:8px;flex-shrink:0}
.modal-ext-btn{display:flex;align-items:center;justify-content:center;width:36px;height:36px;border-radius:var(--radius-sm);color:var(--text-muted);font-size:1rem;font-weight:700;text-decoration:none;background:var(--surface-2);border:1px solid var(--border);transition:background var(--t),color var(--t),border-color var(--t)}
.modal-ext-btn:hover{background:var(--primary);color:#0a0f0d;border-color:var(--primary)}
.modal-close{width:36px;height:36px;border-radius:var(--radius-sm);color:var(--text-muted);font-size:1rem;display:flex;align-items:center;justify-content:center;transition:background var(--t),color var(--t)}
.modal-close:hover{background:var(--surface-2);color:var(--danger)}
.iframe-wrapper{position:relative;flex:1;min-height:0}
#game-iframe{width:100%;height:100%;min-height:530px;border:none;display:block;background:#000}
.iframe-blocker{position:absolute;inset:0;background:var(--surface);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px;color:var(--text-muted)}
.iframe-blocker span{font-size:2.5rem}
.open-external-btn{display:inline-block;margin-top:4px;padding:10px 22px;background:var(--primary);color:#0a0f0d;border-radius:var(--radius-sm);font-weight:700;font-size:0.9rem;transition:background var(--t)}
.open-external-btn:hover{background:var(--accent)}
.hidden{display:none!important}
::-webkit-scrollbar{width:6px}
::-webkit-scrollbar-track{background:var(--bg)}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:99px}
@media(max-width:600px){
  .search-input{width:140px}.hero{padding:40px 16px 30px}
  .filter-bar,.game-grid,.results-bar{padding-left:16px;padding-right:16px}
  .game-grid{grid-template-columns:repeat(auto-fill,minmax(145px,1fr))}
  #game-iframe{min-height:340px}
}
  </style>
</head>
<body>

<header class="site-header">
  <div class="header-inner">
    <div class="logo">
      <span class="logo-icon">🌿</span>
      <span class="logo-text">Minty<em>Games</em></span>
    </div>
    <input type="text" id="search-input" class="search-input" placeholder="Search 147 games…" autocomplete="off"/>
  </div>
</header>

<section class="hero">
  <p class="hero-eyebrow">100% unblocked · plays in browser · no installs</p>
  <h1 class="hero-title">Play.<br/>No blocks.<br/>No installs.</h1>
  <p class="hero-sub"><span id="game-count"></span> games — all self-hosted, always fresh.</p>
</section>

<nav class="filter-bar" id="filter-bar">
  <button class="filter-btn active" data-category="All">All</button>
</nav>

<div class="results-bar" id="results-bar"></div>
<main class="game-grid" id="game-grid"></main>

<div class="empty-state hidden" id="empty-state">
  <span class="empty-icon">🕹️</span>
  <p>No games match "<span id="empty-query"></span>"</p>
</div>

<div class="modal-overlay hidden" id="modal-overlay">
  <div class="modal">
    <div class="modal-header">
      <div class="modal-title-group">
        <span class="modal-emoji" id="modal-emoji"></span>
        <div>
          <h2 class="modal-title" id="modal-title"></h2>
          <span class="modal-badge" id="modal-category"></span>
        </div>
      </div>
      <div class="modal-actions">
        <a id="modal-external" href="#" target="_blank" rel="noopener" class="modal-ext-btn" title="Open in new tab">↗</a>
        <button class="modal-close" id="modal-close" aria-label="Close">✕</button>
      </div>
    </div>
    <div class="iframe-wrapper">
      <iframe id="game-iframe" src="" title="Game" allowfullscreen loading="lazy"
        sandbox="allow-scripts allow-same-origin allow-forms allow-popups allow-pointer-lock"></iframe>
      <div class="iframe-blocker hidden" id="iframe-blocker">
        <span>🚫</span>
        <p>This game couldn't load in the frame.</p>
        <a id="iframe-external-link" href="#" target="_blank" rel="noopener" class="open-external-btn">Open in new tab ↗</a>
      </div>
    </div>
  </div>
</div>

let allGames=GAMES, activeCategory='All', searchQuery='';
const grid=document.getElementById('game-grid'),filterBar=document.getElementById('filter-bar'),searchInput=document.getElementById('search-input'),emptyState=document.getElementById('empty-state'),emptyQuery=document.getElementById('empty-query'),gameCount=document.getElementById('game-count'),resultsBar=document.getElementById('results-bar'),overlay=document.getElementById('modal-overlay'),mClose=document.getElementById('modal-close'),mTitle=document.getElementById('modal-title'),mEmoji=document.getElementById('modal-emoji'),mCat=document.getElementById('modal-category'),mExt=document.getElementById('modal-external'),iframe=document.getElementById('game-iframe'),blocker=document.getElementById('iframe-blocker'),blockerLink=document.getElementById('iframe-external-link');

if(gameCount)gameCount.textContent=allGames.length;
const cats=['All',...new Set(allGames.map(g=>g.category).sort())];
cats.forEach(cat=>{
  if(cat==='All'){filterBar.querySelector('[data-category="All"]').addEventListener('click',()=>setCategory('All'));return;}
  const btn=document.createElement('button');btn.className='filter-btn';btn.dataset.category=cat;btn.textContent=cat;btn.addEventListener('click',()=>setCategory(cat));filterBar.appendChild(btn);
});

function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}

function render(){
  const q=searchQuery.toLowerCase().trim();
  const filtered=allGames.filter(g=>(activeCategory==='All'||g.category===activeCategory)&&(!q||g.title.toLowerCase().includes(q)||g.description.toLowerCase().includes(q)||g.category.toLowerCase().includes(q)));
  grid.innerHTML='';
  if(filtered.length===0){emptyQuery.textContent=searchQuery||activeCategory;emptyState.classList.remove('hidden');if(resultsBar)resultsBar.textContent='0 games';return;}
  emptyState.classList.add('hidden');
  if(resultsBar)resultsBar.textContent=filtered.length===allGames.length?`${allGames.length} games`:`${filtered.length} of ${allGames.length} games`;
  filtered.forEach(game=>{
    const card=document.createElement('article');card.className='game-card';
    card.innerHTML=`<span class="card-emoji">${game.thumbnail}</span><h3 class="card-title">${esc(game.title)}</h3><p class="card-desc">${esc(game.description)}</p><span class="card-badge">${esc(game.category)}</span><button class="card-play-btn">▶ Play</button>`;
    card.addEventListener('click',()=>openGame(game));grid.appendChild(card);
  });
}

function setCategory(cat){activeCategory=cat;filterBar.querySelectorAll('.filter-btn').forEach(b=>b.classList.toggle('active',b.dataset.category===cat));render();}
searchInput.addEventListener('input',e=>{searchQuery=e.target.value;render();});

function openGame(game){
  mTitle.textContent=game.title;mEmoji.textContent=game.thumbnail;mCat.textContent=game.category;mExt.href=game.url;blockerLink.href=game.url;
  blocker.classList.add('hidden');iframe.classList.remove('hidden');iframe.src='';
  overlay.classList.remove('hidden');document.body.style.overflow='hidden';
  requestAnimationFrame(()=>{iframe.src=game.url;});
  iframe.addEventListener('load',function check(){iframe.removeEventListener('load',check);try{const doc=iframe.contentDocument;if(doc&&doc.body&&doc.body.innerHTML==='')showBlocker();}catch{}});
}
function showBlocker(){iframe.classList.add('hidden');blocker.classList.remove('hidden');}
function closeModal(){overlay.classList.add('hidden');document.body.style.overflow='';iframe.src='';}
mClose.addEventListener('click',closeModal);
overlay.addEventListener('click',e=>{if(e.target===overlay)closeModal();});
document.addEventListener('keydown',e=>{if(e.key==='Escape')closeModal();});
render();
})();
</script>
